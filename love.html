<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>晴晴我爱你</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0010;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas { display: block; }
    #message {
      position: fixed;
      top: 5%;
      width: 100%;
      text-align: center;
      font-size: clamp(30px, 5vw, 50px);
      font-weight: bold;
      color: #ff4473;
      text-shadow: 0 0 30px #ff4473, 0 0 60px #ff7799;
      z-index: 10;
      pointer-events: none;
      animation: pulse 2s infinite;
      letter-spacing: 6px;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); text-shadow: 0 0 30px #ff4473; }
      50% { transform: scale(1.05); text-shadow: 0 0 60px #ff7799, 0 0 90px #ffaacc; }
    }
    #sub {
      position: fixed;
      bottom: 5%;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.45);
      font-size: 14px;
      z-index: 10;
      pointer-events: none;
      letter-spacing: 3px;
    }

    /* ✅ 音乐按钮样式 */
    #musicBtn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 100;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid #ff6b9d;
      background: rgba(0,0,0,0.6);
      color: #ff6b9d;
      font-size: 24px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #musicBtn:hover {
      border-color: #ffaacc;
      box-shadow: 0 0 20px rgba(255,107,157,0.5);
    }
  </style>
</head>
<body>
  <div id="message">晴晴我爱你</div>
  <div id="sub">💗 心动花开 · 为你绽放 💗</div>
  <canvas id="loveCanvas"></canvas>

  <!-- ✅ 音乐按钮 -->
  <button id="musicBtn" onclick="toggleMusic()">🎵</button>

  <!-- ✅ 背景音乐 -->
  <audio id="bgm" loop>
    <source src="https://music.163.com/song/media/outer/url?id=4329912.mp3" type="audio/mpeg">
  </audio>

  <script>
    // ✅ 音乐控制
    var bgm = document.getElementById('bgm');
    var musicBtn = document.getElementById('musicBtn');
    var isPlaying = false;

    function toggleMusic() {
      if (isPlaying) {
        bgm.pause();
        musicBtn.textContent = '🎵';
        musicBtn.style.borderColor = '#ff6b9d';
      } else {
        bgm.play().catch(function() {
          alert('请先点击一下页面任意位置，再点🎵播放音乐');
        });
        musicBtn.textContent = '💗';
        musicBtn.style.borderColor = '#ffaacc';
      }
      isPlaying = !isPlaying;
    }

    // ✅ 点击页面任意位置后自动尝试播放（绕过浏览器限制）
    document.addEventListener('click', function() {
      if (!isPlaying) {
        bgm.play().catch(function(){});
        musicBtn.textContent = '💗';
        musicBtn.style.borderColor = '#ffaacc';
        isPlaying = true;
      }
    }, { once: true });

    const canvas = document.getElementById('loveCanvas');
    const ctx = canvas.getContext('2d');
    let w, h;
    let hearts = [];
    let petals = [];
    let particles = [];
    let treeBranches = [];

    function resize() {
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = w;
      canvas.height = h;
      initTree();
    }
    window.addEventListener('resize', resize);

    function heartX(t) { return 16 * Math.sin(t) * Math.sin(t) * Math.sin(t); }
    function heartY(t) { return -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)); }

    function initTree() {
      treeBranches = [];
      const startX = w / 2;
      const startY = h * 0.85;
      const trunkLen = h * 0.2;
      
      treeBranches.push({
        x1: startX, y1: startY,
        x2: startX, y2: startY - trunkLen,
        width: 10, color: '#5d3a3a', level: 0
      });
      
      function growBranches(x1, y1, x2, y2, level, maxLevel) {
        if (level >= maxLevel) return;
        const dx = x2 - x1, dy = y2 - y1;
        const len = Math.sqrt(dx * dx + dy * dy) * 0.7;
        const angle = Math.atan2(dy, dx);
        const branchCount = level < 3 ? 3 : 2;
        
        for (let i = 0; i < branchCount; i++) {
          const spreadAngle = (i - (branchCount-1)/2) * 0.7 + (Math.random() - 0.5) * 0.3;
          const newAngle = angle + spreadAngle;
          const nx = x2 + Math.cos(newAngle) * len;
          const ny = y2 + Math.sin(newAngle) * len;
          treeBranches.push({
            x1: x2, y1: y2, x2: nx, y2: ny,
            width: Math.max(1, 8 - level * 2),
            color: level < 2 ? '#6b3a3a' : (level < 4 ? '#8b4a4a' : '#a05555'),
            level: level + 1
          });
          growBranches(x2, y2, nx, ny, level + 1, maxLevel);
        }
      }
      growBranches(startX, startY, startX, startY - trunkLen, 0, 6);
    }

    class Petal {
      constructor() {
        this.reset();
        this.y = Math.random() * h;
      }
      reset() {
        this.x = Math.random() * w;
        this.y = -20;
        this.size = 4 + Math.random() * 8;
        this.speed = 0.5 + Math.random() * 2;
        this.wobble = Math.random() * 2 - 1;
        this.wobbleSpeed = 0.01 + Math.random() * 0.02;
        this.opacity = 0.4 + Math.random() * 0.5;
        this.color = `rgba(${255}, ${80 + Math.floor(Math.random()*100)}, ${120 + Math.floor(Math.random()*100)}, ${this.opacity})`;
        this.rotation = Math.random() * 360;
        this.rotSpeed = (Math.random() - 0.5) * 2;
      }
      update() {
        this.y += this.speed;
        this.x += Math.sin(this.y * this.wobbleSpeed) * this.wobble;
        this.rotation += this.rotSpeed;
        if (this.y > h + 20) this.reset();
      }
      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation * Math.PI / 180);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.ellipse(0, 0, this.size, this.size * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    class FloatHeart {
      constructor() {
        this.reset();
        this.y = Math.random() * h;
      }
      reset() {
        this.x = Math.random() * w;
        this.y = h + 30;
        this.size = 10 + Math.random() * 18;
        this.speed = 0.4 + Math.random() * 1.2;
        this.opacity = 0.3 + Math.random() * 0.5;
        this.wobble = (Math.random() - 0.5) * 2;
        this.wobbleSpeed = 0.005 + Math.random() * 0.015;
        this.hue = 330 + Math.floor(Math.random() * 30);
      }
      update() {
        this.y -= this.speed;
        this.x += Math.sin(this.y * this.wobbleSpeed) * this.wobble;
        if (this.y < -40) this.reset();
      }
      draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.font = `${this.size}px Arial`;
        ctx.fillText('❤️', this.x, this.y);
        ctx.restore();
      }
    }

    class SparkParticle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2 - 1;
        this.life = 0.5 + Math.random() * 0.5;
        this.decay = 0.01 + Math.random() * 0.02;
        this.size = 1 + Math.random() * 3;
        this.color = `hsl(${340 + Math.random()*30}, 100%, ${60 + Math.random()*40}%)`;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
      }
      draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.shadowBlur = this.size * 3;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    for (let i = 0; i < 50; i++) petals.push(new Petal());
    for (let i = 0; i < 20; i++) hearts.push(new FloatHeart());

    resize();

    let time = 0;
    function animate() {
      time++;
      ctx.clearRect(0, 0, w, h);

      const bgGrad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w,h));
      bgGrad.addColorStop(0, '#1a0025');
      bgGrad.addColorStop(0.5, '#0d0015');
      bgGrad.addColorStop(1, '#050008');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, w, h);

      treeBranches.forEach(branch => {
        ctx.beginPath();
        ctx.moveTo(branch.x1, branch.y1);
        ctx.lineTo(branch.x2, branch.y2);
        ctx.strokeStyle = branch.color;
        ctx.lineWidth = branch.width;
        ctx.lineCap = 'round';
        ctx.stroke();
        
        if (branch.level >= 5) {
          const s = 3 + Math.random() * 2;
          for (let t = 0; t < Math.PI * 2; t += 0.3) {
            const hx = heartX(t) * s * 0.3 + branch.x2;
            const hy = heartY(t) * s * 0.3 + branch.y2;
            ctx.fillStyle = `rgba(255, ${60 + Math.floor(Math.random()*80)}, ${120 + Math.floor(Math.random()*80)}, 0.8)`;
            ctx.beginPath();
            ctx.arc(hx, hy, 1.5 + Math.random(), 0, Math.PI * 2);
            ctx.fill();
          }
        }
      });

      petals.forEach(p => { p.update(); p.draw(ctx); });
      hearts.forEach(h => { h.update(); h.draw(ctx); });

      if (time % 15 === 0 && treeBranches.length > 0) {
        const flowerBranches = treeBranches.filter(b => b.level >= 5);
        if (flowerBranches.length > 0) {
          const fb = flowerBranches[Math.floor(Math.random() * flowerBranches.length)];
          for (let i = 0; i < 3; i++) {
            particles.push(new SparkParticle(fb.x2, fb.y2));
          }
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw(ctx);
        if (particles[i].life <= 0) particles.splice(i, 1);
      }

      requestAnimationFrame(animate);
    }

    animate();
    console.log('💖 晴晴我爱你 💖');
  </script>
</body>
</html>
